<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寬宏搶票遙控器</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md bg-zinc-900 p-8 rounded-3xl shadow-2xl border border-zinc-800">
        <h1 class="text-3xl font-black mb-2 text-center text-blue-500 italic">KHAM BOT</h1>
        <p class="text-zinc-500 text-center text-sm mb-8">雲端自動化搶票系統</p>
        
        <div class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-zinc-400 uppercase mb-2">節目購票網址</label>
                <input id="url" type="text" placeholder="https://kham.com.tw/..." 
                       class="w-full p-4 bg-black rounded-xl border border-zinc-700 focus:border-blue-500 transition outline-none">
            </div>
            <div>
                <label class="block text-xs font-bold text-zinc-400 uppercase mb-2">目標區域關鍵字</label>
                <input id="zone" type="text" placeholder="例如：特A區" 
                       class="w-full p-4 bg-black rounded-xl border border-zinc-700 focus:border-blue-500 transition outline-none">
            </div>
            <button onclick="sendTask()" id="btn"
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl shadow-lg shadow-blue-900/20 transition-all active:scale-95">
                啟動雲端機器人
            </button>
        </div>

        <div id="status" class="mt-8 p-4 bg-black rounded-xl text-sm text-zinc-500 border border-zinc-800 hidden">
            正在通訊中...
        </div>
    </div>

    <script>
        async function sendTask() {
            const url = document.getElementById('url').value;
            const zone = document.getElementById('zone').value;
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');

            if(!url || !zone) return alert('請完整輸入網址與區域');

            btn.disabled = true;
            btn.innerText = '指令傳送中...';
            status.classList.remove('hidden');

            try {
                const response = await fetch('https://tickets-production-fec6.up.railway.app/grab', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, zone })
                });
                const data = await response.json();
                status.innerHTML = `<span class="text-blue-500 font-bold">●</span> ${data.message}`;
            } catch (error) {
                status.innerHTML = `<span class="text-red-500 font-bold">●</span> 無法連線至大腦，請檢查 Railway 狀態`;
            } finally {
                btn.disabled = false;
                btn.innerText = '啟動雲端機器人';
            }
        }
    </script>
</body>
</html>
